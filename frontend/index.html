<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Sign Language Avatar</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>AI Sign Language Avatar</h1>
      <p class="subtitle">Type English text and watch the avatar sign it in ASL</p>
    </header>

    <div id="controls">
      <textarea
        id="input-text"
        placeholder="Type a sentence, e.g. Hello, how are you today?"
        rows="3"
      ></textarea>
      <div id="control-row">
        <button id="sign-btn">Sign it ▶</button>
        <button id="replay-btn" disabled>Replay ↺</button>
        <label>
          Speed
          <input id="speed-slider" type="range" min="0.25" max="3" step="0.25" value="1" />
          <span id="speed-label">1×</span>
        </label>
      </div>
      <div id="gloss-display"></div>
    </div>

    <div id="canvas-container">
      <!--
        Place your Mixamo avatar at:  frontend/assets/avatar.glb

        To get one (free):
          1. Go to https://www.mixamo.com  (free Adobe account)
          2. Pick any humanoid character (e.g. "Y Bot" or "X Bot")
          3. Click Download → Format: FBX, Pose: T-Pose
          4. Open in Blender → File > Import > FBX
             then File > Export > glTF 2.0 (.glb) → save as avatar.glb
          5. Copy avatar.glb to  frontend/assets/avatar.glb

        Bone names (LeftArm, LeftForeArm, LeftHandIndex1 …) are standard
        Mixamo — no code changes needed.

        If avatar.glb is missing, the app falls back to a stick figure.
      -->
      <canvas id="render-canvas"></canvas>
      <div id="status-overlay"></div>
    </div>
  </div>

  <!-- Babylon.js 7 core — no build step required -->
  <script src="https://cdn.babylonjs.com/babylon.js"></script>
  <!-- GLTF/GLB loader (must come after babylon.js) -->
  <script src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"></script>
  <!-- Materials library (GridMaterial, etc.) -->
  <script src="https://cdn.babylonjs.com/materialsLibrary/babylonjs.materials.min.js"></script>

  <script type="module" src="main.js"></script>
</body>
</html>
